<script>
var PW="drchang.ent33";
function doPwCheck(){
  var v=document.getElementById("pwInput").value;
  if(v===PW){
    document.getElementById("lockScreen").style.display="none";
    document.body.style.overflow="auto";
  }else{
    document.getElementById("pwError").textContent="密碼錯誤";
    setTimeout(function(){document.getElementById("pwError").textContent="";},2000);
  }
}
function togglePw(){
  var i=document.getElementById("pwInput"),b=document.getElementById("eyeBtn");
  if(i.type==="password"){i.type="text";b.textContent="🙈";}else{i.type="password";b.textContent="👁";}
}
</script>
<style>
:root{--teal:#3d7a8a;--teal-light:#5a9daf;--teal-dark:#2a5f6e;--gold:#c9a84c;--gold-light:#e6c97a;--bg:#f7f5f1;--card:#fff;--text:#2c2c2c;--light:#6b6b6b;--border:#e0d8cc;--tag-bg:#e8f4f7;--tag-text:#2a6b7c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

.lock-icon{font-size:40px;margin-bottom:16px}
.lock-title{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;color:#2a5f6e;margin-bottom:6px}
.lock-sub{font-size:13px;color:#888;margin-bottom:24px}
.pw-wrap{position:relative;margin-bottom:12px}

.pw-wrap input:focus{border-color:#3d7a8a}
.pw-wrap button{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px}
.lock-btn{width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,#2a5f6e,#3d7a8a);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.lock-error{font-size:12px;color:#c0392b;margin-top:10px;min-height:18px}
.hero{background:linear-gradient(135deg,#2a5f6e 0%,#3d7a8a 40%,#5a9daf 100%);padding:60px 5% 50px;position:relative;overflow:hidden}
.hero-label{display:inline-block;background:rgba(201,168,76,.85);color:#fff;font-size:11px;font-weight:600;letter-spacing:2px;padding:5px 14px;border-radius:2px;margin-bottom:22px;text-transform:uppercase}

.notice-box a{color:var(--teal);font-weight:600;text-decoration:none}
.main{max-width:1200px;margin:0 auto;padding:40px 5% 60px}
.search-wrap{position:relative;margin-bottom:20px}

    var n = s === "全部" ? DOCTORS.length : counts[s];
    var active = s === activeFilter ? " active" : "";
    return '<button class="filter-tag' + active + '" onclick="setFilter(\'' + s + '\')">' + s + '<span class="count">' + n + "</span></button>";
  }).join("");
  document.getElementById("filterTags").innerHTML = html;
}

function setFilter(s) { activeFilter = s; buildFilters(); render(); }

function esc(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderCard(d) {
  var socials = [];
  if (d.fb) socials.push('<a href="' + esc(d.fb) + '" target="_blank" class="social-btn">🔵 Facebook</a>');
  if (d.ig) socials.push('<a href="' + esc(d.ig) + '" target="_blank" class="social-btn">📸 Instagram</a>');
  if (d.other_media) socials.push('<a href="' + esc(d.other_media) + '" target="_blank" class="social-btn">🔗 其他媒體</a>');
  if (d.card_url) socials.push('<a href="' + esc(d.card_url) + '" target="_blank" class="card-btn">📇 電子名片</a>');
  var html = '<div class="doctor-card">';
  html += '<div class="doctor-name">' + esc(d.name) + '<span>醫師</span></div>';
  html += '<div class="specialty-tag">' + esc(d.specialty) + "</div>";
  if (d.hospital) html += '<div class="doctor-hospital">' + esc(d.hospital) + "</div>";
  if (d.title) html += '<div class="doctor-title">' + esc(d.title) + "</div>";
  if (d.bio) html += '<div class="card-divider"></div><div class="card-bio">' + esc(d.bio) + "</div>";
  if (d.collab) html += '<div class="collab-section"><div class="collab-label">可接受合作項目</div><div class="collab-text">' + esc(d.collab) + "</div></div>";
  if (d.dream_brand) html += '<div class="collab-section"><div class="collab-label dream">期待合作品牌</div><div class="collab-text">' + esc(d.dream_brand) + "</div></div>";
  if (socials.length) html += '<div class="card-footer">' + socials.join("") + "</div>";
  html += "</div>";
  return html;
}

function getFiltered() {
  return DOCTORS.filter(function(d) {
    if (activeFilter !== "全部" && d.specialty !== activeFilter) return false;
    if (!searchQuery) return true;
    var q = searchQuery.toLowerCase();
    return [d.name, d.specialty, d.hospital, d.title, d.bio, d.collab, d.dream_brand].some(function(v) {
      return (v || "").toLowerCase().indexOf(q) >= 0;
    });
  });
}

function render() {
  var filtered = getFiltered();
  var container = document.getElementById("doctorList");
  if (!filtered.length) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:#888">找不到符合條件的醫師</div>';
    return;
  }
  if (activeFilter === "全部" && !searchQuery) {
    var groups = {};
    SPEC_ORDER.forEach(function(s) { groups[s] = []; });
    filtered.forEach(function(d) {
      if (!groups[d.specialty]) groups[d.specialty] = [];
      groups[d.specialty].push(d);
    });
    container.innerHTML = SPEC_ORDER.filter(function(s) {
      return groups[s] && groups[s].length;
    }).map(function(s) {
      return '<div class="specialty-section"><div class="section-header"><h2>' + s + '</h2><span class="section-count">' + groups[s].length + ' 位醫師</span></div><div class="doctor-grid">' + groups[s].map(renderCard).join("") + "</div></div>";
    }).join("");
  } else {
    container.innerHTML = '<div class="specialty-section"><div class="section-header"><h2>' + (activeFilter === "全部" ? "搜尋結果" : activeFilter) + '</h2><span class="section-count">' + filtered.length + ' 位醫師</span></div><div class="doctor-grid">' + filtered.map(renderCard).join("") + "</div></div>";
  }
}

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value.trim();
  render();
});

buildFilters();
render();
</script>
</body>
</html>
